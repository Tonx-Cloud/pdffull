name: ci
on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci --ignore-scripts

      - name: Lint
        run: npm run lint --if-present

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build
        env:
          # Supabase placeholders para build estático passar (Next.js valida no build)
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
        run: npm run build

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: npm audit (high+)
        run: npm audit --audit-level=high || true
      - name: Verifica SECURITY.md
        run: test -f SECURITY.md
      - name: Verifica security.txt
        run: test -f public/.well-known/security.txt
